version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
    env_file: ./backend/.env
    restart: unless-stopped
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports: ["5173:5173"]
    env_file: ./frontend/.env
    depends_on: [backend]
    restart: unless-stopped
